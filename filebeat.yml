# filebeat.yml
filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /app/logs/app.log
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: event_type
    tags: ["titanic-app"]

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "titanic-logs-%{+yyyy.MM.dd}"

setup.kibana:
  host: "kibana:5601"

setup.ilm.enabled: false

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7